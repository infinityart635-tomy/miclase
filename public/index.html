<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiClase</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="logged-out">
  <div class="page-shell">
    <header class="brand-block">
      <p class="eyebrow">Campus local</p>
      <h1>MiClase</h1>
    </header>

    <main class="auth-card">
      <div class="auth-copy">
        <p class="eyebrow">Acceso</p>
        <h2>Iniciar sesion</h2>
        <p>Entra con tu nombre, apellido, nombre completo o Gmail y tu contrasena.</p>
      </div>

      <form class="auth-form">
        <label>
          <span>Usuario o Gmail</span>
          <input type="text" placeholder="Ej: Juan, Perez, Juan Perez o tucorreo@gmail.com">
        </label>

        <label>
          <span>Contrasena</span>
          <input type="password" placeholder="Tu contrasena">
        </label>

        <button class="primary-button" type="submit">ENTRAR</button>
        <button class="secondary-button" type="button">NO TENGO CUENTA</button>
        <button class="secondary-button" type="button">OLVIDE MI CONTRASENA</button>
      </form>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
