<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiClase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="hero">
    <section class="panel welcome-panel" id="welcomePanel">
      <p class="eyebrow">MiClase</p>
      <h1>Organiza tus clases en un solo lugar.</h1>
      <p class="lead">Un espacio simple para entrar, ordenar materias y seguir tu cursada.</p>
      <button class="button" id="startButton" type="button">Empezar</button>
    </section>

    <section class="panel login-panel hidden" id="loginPanel">
      <p class="eyebrow">Acceso</p>
      <h2>Ingresar</h2>
      <form class="login-form">
        <label>
          <span>Correo</span>
          <input type="email" placeholder="tucorreo@gmail.com">
        </label>
        <label>
          <span>Contrasena</span>
          <input type="password" placeholder="Tu contrasena">
        </label>
        <button class="button" type="submit">Entrar</button>
      </form>
      <button class="link-button" id="backButton" type="button">Volver</button>
    </section>

    <p class="footer">MiClase <span id="year"></span></p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
